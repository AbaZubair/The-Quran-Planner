  </div>

<script>
const form = document.getElementById('form');
const list = document.getElementById('list');

let logs = JSON.parse(localStorage.getItem('logs')) || [];

function render() {
  list.innerHTML = '';
  logs.forEach((log, i) => {
    const li = document.createElement('li');
    li.className = "p-3 bg-gray-100 rounded flex justify-between";
    li.innerHTML = `
      ${log.surah} - ${log.ayat} ayat
      <button onclick="hapus(${i})" class="text-red-500">X</button>
    `;
    list.appendChild(li);
  });
}

function hapus(i) {
  logs.splice(i, 1);
  save();
}

function save() {
  localStorage.setItem('logs', JSON.stringify(logs));
  render();
}

form.addEventListener('submit', (e) => {
  e.preventDefault();
  const surah = document.getElementById('surah').value;
  const ayat = document.getElementById('ayat').value;

  logs.unshift({ surah, ayat });
  save();
  form.reset();
});

render();
</script>

</body>
</html>
